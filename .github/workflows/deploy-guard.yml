name: Deploy Guard

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  verify-deploy-guard:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify deploy guard
        run: python scripts/verify_deploy_guard.py
