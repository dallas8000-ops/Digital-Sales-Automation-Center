name: Legitimacy CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  legitimacy-gates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run migrations
        run: python manage.py migrate

      - name: Django checks
        run: python manage.py check

      - name: Unit tests
        run: python manage.py test core

      - name: Legitimacy smoke tests
        env:
          ADMIN_API_KEY: ci-smoke-key
        run: python manage.py smoke_legitimacy
